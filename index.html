<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>Jose Flores</title>
		<link

			href="storage/icon.png"

		/>

		<link rel="stylesheet" href="css/index.css" />
		<link rel="stylesheet" href="css/navbar.css" />
		<link rel="stylesheet" href="css/hero.css" />
		<link rel="stylesheet" href="css/button.css" />
		<link rel="stylesheet" href="css/icon.css" />
		<link rel="stylesheet" href="css/footer.css" />
		<link rel="stylesheet" href="css/popup.css" />

		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
		/>
	</head>
	<body>
		<header class="header">
			<nav class="navbar">
				<li class="navbar__brand-link">
					<a href="/">JfloresXc</a>
				</li>
				<ul class="navbar__links">
					<li class="navbar__link navbar__link-actived">
						<a class="popup__button">Mi Perfil</a>
					</li>
					<li class="navbar__link">
						<a class="popup__button">Mis Proyectos</a>
					</li>
					<li class="navbar__link">
						<a class="popup__button">Contacto</a>
					</li>
				</ul>
				<button type="button" class="navbar__menu">
					<span
						class="navbar__menu-line navbar__menu-line-1"
					></span>
					<span
						class="navbar__menu-line navbar__menu-line-2"
					></span>
					<span
						class="navbar__menu-line navbar__menu-line-3"
					></span>

			</nav>
		</header>

		<main>
			<div class="hero">
				<div class="hero__container-data">
					<h1 class="hero__title">Jose Flores</h1>
					<div class="hero__container-description">
						<p class="hero__description">
							Ingeniero de Sistemas | Perú
						</p>
						<p class="hero__email">jfloresxc@gmail.com</p>
					</div>
					<button class="button hero__button popup__button">
						<span class="button-span">Saber más</span>
					</button>
				</div>
				<img
					class="hero__image"
					src="storage/perfil.jpg"
					alt="Jose Flores Worker"
				/>
			</div>
		</main>

		<footer>
			<div class="footer">
				<h3 class="footer__brand">JfloresXc</h3>
				<p class="footer__country">Lima, Perú</p>
				<ul class="icons footer__icons">
					<li class="icon">
						<a
							href="https://www.instagram.com/jose_flcc/"
							target="_blank"
						>
							<i class="fa-brands fa-instagram"></i>
						</a>
					</li>
					<li class="icon">
						<a
							href="https://www.facebook.com/profile.php?id=100008780072055"
							target="_blank"
						>
							<i class="fa-brands fa-facebook-square"></i>
						</a>
					</li>
					<li class="icon">
						<a
							href="https://github.com/JfloresXc"
							target="_blank"
						>
							<i class="fa-brands fa-github-square"></i>
						</a>
					</li>
				</ul>
				<p class="footer__container-contact">
					<span>+51 923692257</span>
					<span>jfloresxc@gmail.com</span>
				</p>
			</div>
		</footer>

		<div class="popup" id="popup">
			<p class="popup__message">
				<span> 👷‍♂️ En construcción ING@ 👷‍♂️</span>
			</p>
		</div>

		<script src="js/index.js"></script>
		<script src="js/popup.js"></script>

</html>
